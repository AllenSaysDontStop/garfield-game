<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 加菲猫大冒险 - 平台跳跃游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,200,255,0.3);
  }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 15px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 10;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
    z-index: 20;
  }
  #overlay h1 { font-size: 48px; margin-bottom: 10px; }
  #overlay p { font-size: 18px; opacity: 0.8; margin-bottom: 8px; }
  #overlay .key {
    display: inline-block;
    background: #333;
    border: 2px solid #666;
    border-radius: 6px;
    padding: 4px 12px;
    font-family: monospace;
    font-size: 16px;
    margin: 0 4px;
  }
  #overlay .start-btn {
    margin-top: 25px;
    padding: 14px 40px;
    font-size: 22px;
    background: linear-gradient(135deg, #00c9ff, #92fe9d);
    border: none;
    border-radius: 30px;
    color: #1a1a2e;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #overlay .start-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(0,200,255,0.5);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="500"></canvas>
  <div id="ui">
    <span>⭐ 分数: <span id="score">0</span></span>
    <span>❤️ 生命: <span id="lives">3</span></span>
  </div>
  <div id="overlay">
    <h1>🐱 加菲猫大冒险</h1>
    <p><span class="key">←</span> <span class="key">→</span> 或 <span class="key">A</span> <span class="key">D</span> 左右移动</p>
    <p><span class="key">空格</span> 或 <span class="key">W</span> 跳跃（可二段跳）</p>
    <p>收集 🍕（千层面）到达 🚩 即可过关！小心 🔴 障碍物！</p>
    <button class="start-btn" onclick="startGame()">开始游戏</button>
  </div>
</div>

<script>
// ============ 游戏配置 ============
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const GRAVITY = 0.55;
const JUMP_FORCE = -13;
const MOVE_SPEED = 5;
const FRICTION = 0.82;

// ============ 游戏状态 ============
let gameState = 'menu'; // menu | playing | win | gameover
let score = 0;
let lives = 3;
let level = 1;
let cameraX = 0;
let keys = {};

// ============ 玩家 ============
const player = {
  x: 60,
  y: 300,
  w: 32,
  h: 44,
  vx: 0,
  vy: 0,
  onGround: false,
  jumpCount: 0,
  maxJumps: 2,
  facingRight: true,
  animFrame: 0
};

// ============ 关卡数据 ============
let platforms = [];
let coins = [];
let enemies = [];
let flag = null;
let particles = [];

function loadLevel(lvl) {
  platforms = [];
  coins = [];
  enemies = [];
  particles = [];
  
  if (lvl === 1) {
    // 地面
    platforms.push({ x: 0, y: 460, w: 2500, h: 40, type: 'ground' });
    // 平台
    platforms.push({ x: 150, y: 370, w: 120, h: 18, type: 'normal' });
    platforms.push({ x: 320, y: 300, w: 100, h: 18, type: 'normal' });
    platforms.push({ x: 480, y: 230, w: 130, h: 18, type: 'normal' });
    platforms.push({ x: 680, y: 310, w: 110, h: 18, type: 'normal' });
    platforms.push({ x: 850, y: 240, w: 140, h: 18, type: 'normal' });
    platforms.push({ x: 1050, y: 320, w: 120, h: 18, type: 'normal' });
    platforms.push({ x: 1220, y: 250, w: 100, h: 18, type: 'normal' });
    platforms.push({ x: 1380, y: 180, w: 130, h: 18, type: 'normal' });
    platforms.push({ x: 1580, y: 270, w: 110, h: 18, type: 'normal' });
    platforms.push({ x: 1750, y: 350, w: 150, h: 18, type: 'normal' });
    platforms.push({ x: 1960, y: 280, w: 120, h: 18, type: 'normal' });
    // 金币
    coins.push({ x: 190, y: 330, r: 12, collected: false });
    coins.push({ x: 355, y: 260, r: 12, collected: false });
    coins.push({ x: 535, y: 190, r: 12, collected: false });
    coins.push({ x: 720, y: 270, r: 12, collected: false });
    coins.push({ x: 905, y: 200, r: 12, collected: false });
    coins.push({ x: 1095, y: 280, r: 12, collected: false });
    coins.push({ x: 1260, y: 210, r: 12, collected: false });
    coins.push({ x: 1435, y: 140, r: 12, collected: false });
    coins.push({ x: 1625, y: 230, r: 12, collected: false });
    coins.push({ x: 1815, y: 310, r: 12, collected: false });
    // 敌人
    enemies.push({ x: 400, y: 424, w: 28, h: 28, vx: -1.5, minX: 300, maxX: 500 });
    enemies.push({ x: 900, y: 204, w: 28, h: 28, vx: 1.5, minX: 850, maxX: 990 });
    enemies.push({ x: 1450, y: 144, w: 28, h: 28, vx: -1.5, minX: 1380, maxX: 1510 });
    enemies.push({ x: 1800, y: 324, w: 28, h: 28, vx: 1.2, minX: 1750, maxX: 1900 });
    // 终点旗帜
    flag = { x: 2100, y: 380, w: 16, h: 80 };
    
  } else if (lvl === 2) {
    platforms.push({ x: 0, y: 460, w: 2800, h: 40, type: 'ground' });
    // 更多更难的平台
    platforms.push({ x: 100, y: 370, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 220, y: 310, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 340, y: 250, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 460, y: 320, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 580, y: 260, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 700, y: 200, w: 100, h: 18, type: 'normal' });
    platforms.push({ x: 850, y: 280, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 970, y: 220, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 1100, y: 160, w: 100, h: 18, type: 'normal' });
    platforms.push({ x: 1260, y: 240, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 1390, y: 180, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 1520, y: 260, w: 100, h: 18, type: 'normal' });
    platforms.push({ x: 1680, y: 200, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 1820, y: 140, w: 100, h: 18, type: 'normal' });
    platforms.push({ x: 1980, y: 220, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 2120, y: 160, w: 80, h: 18, type: 'normal' });
    platforms.push({ x: 2280, y: 240, w: 100, h: 18, type: 'normal' });
    // 金币
    for (let i = 0; i < 17; i++) {
      let px = platforms[i + 1].x + platforms[i + 1].w / 2;
      let py = platforms[i + 1].y - 40;
      coins.push({ x: px, y: py, r: 12, collected: false });
    }
    // 敌人
    enemies.push({ x: 500, y: 424, w: 28, h: 28, vx: -2, minX: 400, maxX: 600 });
    enemies.push({ x: 740, y: 164, w: 28, h: 28, vx: 2, minX: 700, maxX: 800 });
    enemies.push({ x: 1140, y: 124, w: 28, h: 28, vx: -2, minX: 1100, maxX: 1200 });
    enemies.push({ x: 1540, y: 224, w: 28, h: 28, vx: 2, minX: 1520, xmax: 1620 });
    enemies.push({ x: 1850, y: 104, w: 28, h: 28, vx: -2, minX: 1820, maxX: 1920 });
    enemies.push({ x: 2300, y: 204, w: 28, h: 28, vx: 2, minX: 2280, maxX: 2380 });
    flag = { x: 2450, y: 380, w: 16, h: 80 };
  }

  // 重置玩家位置
  player.x = 60;
  player.y = 300;
  player.vx = 0;
  player.vy = 0;
  player.jumpCount = 0;
  cameraX = 0;
}

// ============ 输入处理 ============
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// ============ 碰撞检测 ============
function rectIntersect(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && 
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function circleRectIntersect(cx, cy, cr, rx, ry, rw, rh) {
  let nearestX = Math.max(rx, Math.min(cx, rx + rw));
  let nearestY = Math.max(ry, Math.min(cy, ry + rh));
  let dx = cx - nearestX;
  let dy = cy - nearestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

// ============ 粒子效果 ============
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 1,
      color,
      size: 3 + Math.random() * 4
    });
  }
}

// ============ 更新逻辑 ============
function update() {
  if (gameState !== 'playing') return;

  // 玩家移动
  if (keys['ArrowLeft'] || keys['KeyA']) {
    player.vx -= MOVE_SPEED * 0.25;
    player.facingRight = false;
  }
  if (keys['ArrowRight'] || keys['KeyD']) {
    player.vx += MOVE_SPEED * 0.25;
    player.facingRight = true;
  }

  // 跳跃（支持二段跳）
  if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && player.jumpCount < player.maxJumps) {
    if (!player._jumpPressed) {
      player.vy = JUMP_FORCE;
      player.jumpCount++;
      player._jumpPressed = true;
      spawnParticles(player.x + player.w / 2, player.y + player.h, '#aaa', 5);
    }
  } else {
    player._jumpPressed = false;
  }

  // 物理更新
  player.vx *= FRICTION;
  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;

  // 动画帧
  if (Math.abs(player.vx) > 0.5) {
    player.animFrame += 0.2;
  } else {
    player.animFrame = 0;
  }

  // 平台碰撞
  player.onGround = false;
  for (const p of platforms) {
    if (rectIntersect(player, p)) {
      // 从上方落下
      if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 5) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
        player.jumpCount = 0;
      }
      // 从下方撞击
      else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 5) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
      // 从侧面碰撞
      else {
        if (player.vx > 0) player.x = p.x - player.w;
        else if (player.vx < 0) player.x = p.x + p.w;
        player.vx = 0;
      }
    }
  }

  // 掉出地图 → 扣命重置
  if (player.y > H + 50) {
    loseLife();
  }

  // 收集金币
  for (const c of coins) {
    if (!c.collected && circleRectIntersect(c.x, c.y, c.r, player.x, player.y, player.w, player.h)) {
      c.collected = true;
      score += 100;
      document.getElementById('score').textContent = score;
      spawnParticles(c.x, c.y, '#ffd700', 10);
    }
  }

  // 敌人碰撞
  for (const e of enemies) {
    e.x += e.vx;
    if (e.x <= e.minX || e.x + e.w >= e.maxX) e.vx *= -1;
    
    if (rectIntersect(player, e)) {
      // 踩敌人头顶可以消灭
      if (player.vy > 0 && player.y + player.h < e.y + e.h / 2 + 10) {
        e.dead = true;
        player.vy = JUMP_FORCE * 0.7;
        score += 200;
        document.getElementById('score').textContent = score;
        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ff4444', 12);
      } else {
        loseLife();
        break;
      }
    }
  }
  enemies = enemies.filter(e => !e.dead);

  // 终点检测
  if (flag && rectIntersect(player, { x: flag.x - 10, y: flag.y, w: flag.w + 20, h: flag.h })) {
    gameState = 'win';
    showOverlay(`🎉 第 ${level} 关通过！`, `得分：${score}`, `按空格进入第 ${level + 1} 关`);
  }

  // 相机跟随
  let targetCam = player.x - W / 3;
  targetCam = Math.max(0, Math.min(targetCam, 2600 - W));
  cameraX += (targetCam - cameraX) * 0.08;

  // 粒子更新
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.03;
  }
  particles = particles.filter(p => p.life > 0);
}

function loseLife() {
  lives--;
  document.getElementById('lives').textContent = lives;
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ff4444', 15);
  if (lives <= 0) {
    gameState = 'gameover';
    showOverlay('💀 游戏结束', `最终得分：${score}`, '按空格重新开始');
  } else {
    // 重置到起点附近
    player.x = Math.max(60, cameraX + 60);
    player.y = 200;
    player.vx = 0;
    player.vy = 0;
    player.jumpCount = 0;
  }
}

// ============ 绘制 ============
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 背景渐变（视差效果）
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0f0c29');
  grad.addColorStop(0.5, '#302b63');
  grad.addColorStop(1, '#24243e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 星星背景
  ctx.save();
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 50; i++) {
    let sx = ((i * 173) % 2400) - cameraX * 0.2;
    sy = ((i * 97) % 450);
    let size = (i % 3) + 1;
    ctx.fillStyle = i % 5 === 0 ? '#fff' : '#aaccff';
    ctx.beginPath();
    ctx.arc(sx % (W + 100) - 50, sy, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  ctx.save();
  ctx.translate(-cameraX, 0);

  // 绘制平台
  for (const p of platforms) {
    if (p.type === 'ground') {
      const gGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
      gGrad.addColorStop(0, '#4a5568');
      gGrad.addColorStop(1, '#2d3748');
      ctx.fillStyle = gGrad;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // 草地顶部
      ctx.fillStyle = '#48bb78';
      ctx.fillRect(p.x, p.y, p.w, 6);
    } else {
      const pGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
      pGrad.addColorStop(0, '#667eea');
      pGrad.addColorStop(1, '#5a67d8');
      ctx.fillStyle = pGrad;
      // 圆角矩形
      roundRect(ctx, p.x, p.y, p.w, p.h, 6);
      ctx.fill();
      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      roundRect(ctx, p.x, p.y, p.w, p.h / 2.5, 6);
      ctx.fill();
    }
  }

  // 绘制千层面（加菲猫的最爱！）
  const time = Date.now() / 1000;
  for (const c of coins) {
    if (c.collected) continue;
    let bounce = Math.sin(time * 4 + c.x) * 3;
    let cy = c.y + bounce;
    
    // 光晕
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    
    // 千层面本体（椭圆形盘子）
    const lasagnaGrad = ctx.createLinearGradient(c.x - c.r, cy - c.r * 0.7, c.x + c.r, cy + c.r * 0.7);
    lasagnaGrad.addColorStop(0, '#e8a84c');
    lasagnaGrad.addColorStop(0.5, '#d4782c');
    lasagnaGrad.addColorStop(1, '#b85c1a');
    ctx.fillStyle = lasagnaGrad;
    ctx.beginPath();
    ctx.ellipse(c.x, cy, c.r + 3, c.r * 0.65, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 奶酪层（黄色）
    ctx.fillStyle = '#ffe066';
    ctx.beginPath();
    ctx.ellipse(c.x, cy - 1, c.r - 1, c.r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 肉酱纹理
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 1.5;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(c.x - 6 + i * 4, cy - 3);
      ctx.quadraticCurveTo(c.x - 4 + i * 4, cy, c.x - 2 + i * 4, cy + 2);
      ctx.stroke();
    }
    // 芝士高光
    ctx.strokeStyle = '#fff8b0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(c.x - 6, cy - 4);
    ctx.quadraticCurveTo(c.x - 2, cy - 6, c.x + 4, cy - 4);
    ctx.stroke();
    
    ctx.shadowBlur = 0;
  }

  // 绘制敌人
  for (const e of enemies) {
    // 身体
    ctx.fillStyle = '#e53e3e';
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2 + 2, e.w / 2, 0, Math.PI * 2);
    ctx.fill();
    // 眼睛
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2 - 5, e.y + e.h / 2 - 2, 5, 0, Math.PI * 2);
    ctx.arc(e.x + e.w / 2 + 5, e.y + e.h / 2 - 2, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2 - 4, e.y + e.h / 2 - 2, 2.5, 0, Math.PI * 2);
    ctx.arc(e.x + e.w / 2 + 6, e.y + e.h / 2 - 2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // 愤怒眉毛
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(e.x + e.w / 2 - 9, e.y + e.h / 2 - 8);
    ctx.lineTo(e.x + e.w / 2 - 1, e.y + e.h / 2 - 5);
    ctx.moveTo(e.x + e.w / 2 + 9, e.y + e.h / 2 - 8);
    ctx.lineTo(e.x + e.w / 2 + 1, e.y + e.h / 2 - 5);
    ctx.stroke();
  }

  // 绘制终点旗
  if (flag) {
    // 旗杆
    ctx.fillStyle = '#8b5cf6';
    ctx.fillRect(flag.x, flag.y, flag.w, flag.h);
    // 旗帜（飘动效果）
    let waveOffset = Math.sin(time * 3) * 3;
    ctx.fillStyle = '#f093fb';
    ctx.beginPath();
    ctx.moveTo(flag.x + flag.w, flag.y);
    ctx.lineTo(flag.x + flag.w + 40 + waveOffset, flag.y + 15);
    ctx.lineTo(flag.x + flag.w + 38 + waveOffset, flag.y + 35);
    ctx.lineTo(flag.x + flag.w, flag.y + 45);
    ctx.closePath();
    ctx.fill();
    // 星星标志
    ctx.fillStyle = '#fff';
    ctx.font = '16px serif';
    ctx.fillText('★', flag.x + flag.w + 12 + waveOffset, flag.y + 27);
  }

  // 绘制玩家
  drawPlayer();

  // 绘制粒子
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawPlayer() {
  const px = player.x;
  const py = player.y;
  const pw = player.w;
  const ph = player.h;
  const dir = player.facingRight ? 1 : -1;

  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(px + pw / 2, py + ph + 2, pw / 1.8, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  // 翻转朝向
  if (dir < 0) {
    ctx.translate(px + pw / 2, 0);
    ctx.scale(-1, 1);
    ctx.translate(-(px + pw / 2), 0);
  }

  const cx = px + pw / 2; // 中心 x

  // ========== 加菲猫的胖身体 ==========
  // 身体主体（椭圆形胖肚子）
  const bodyGrad = ctx.createRadialGradient(cx, py + 30, 5, cx, py + 30, 22);
  bodyGrad.addColorStop(0, '#ffa64d');   // 亮橙色
  bodyGrad.addColorStop(0.7, '#e87d0d');  // 橙色
  bodyGrad.addColorStop(1, '#c66a08');    // 深橙
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(cx, py + 32, 17, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // 身体上的条纹
  ctx.strokeStyle = '#b35900';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  // 条纹1
  ctx.beginPath();
  ctx.moveTo(cx - 6, py + 20);
  ctx.quadraticCurveTo(cx - 3, py + 28, cx - 5, py + 38);
  ctx.stroke();
  // 条纹2
  ctx.beginPath();
  ctx.moveTo(cx + 1, py + 19);
  ctx.quadraticCurveTo(cx + 4, py + 28, cx + 2, py + 39);
  ctx.stroke();
  // 条纹3
  ctx.beginPath();
  ctx.moveTo(cx + 8, py + 21);
  ctx.quadraticCurveTo(cx + 10, py + 29, cx + 8, py + 37);
  ctx.stroke();

  // ========== 大圆头 ==========
  const headY = py + 10;
  const headGrad = ctx.createRadialGradient(cx - 3, headY - 3, 3, cx, headY, 18);
  headGrad.addColorStop(0, '#ffb84d');
  headGrad.addColorStop(0.75, '#f5920a');
  headGrad.addColorStop(1, '#d47a06');
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.ellipse(cx, headY, 19, 17, 0, 0, Math.PI * 2);
  ctx.fill();

  // 头部条纹（额头）
  ctx.strokeStyle = '#a65c02';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(cx - 2, headY - 15); ctx.lineTo(cx - 1, headY - 10);
  ctx.moveTo(cx + 3, headY - 14); ctx.lineTo(cx + 4, headY - 9);
  ctx.moveTo(cx + 8, headY - 13); ctx.lineTo(cx + 9, headY - 8);
  ctx.stroke();

  // 三角耳朵
  // 左耳
  ctx.fillStyle = '#e87d0d';
  ctx.beginPath();
  ctx.moveTo(cx - 14, headY - 8);
  ctx.lineTo(cx - 18, headY - 20);
  ctx.lineTo(cx - 7, headY - 15);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#b35900';
  ctx.lineWidth = 1;
  ctx.stroke();
  // 右耳
  ctx.beginPath();
  ctx.moveTo(cx + 14, headY - 8);
  ctx.lineTo(cx + 18, headY - 20);
  ctx.lineTo(cx + 7, headY - 15);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // 内耳（粉色）
  ctx.fillStyle = '#ff99a8';
  ctx.beginPath();
  ctx.moveTo(cx - 13, headY - 9);
  ctx.lineTo(cx - 16, headY - 17);
  ctx.lineTo(cx - 9, headY - 14);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + 13, headY - 9);
  ctx.lineTo(cx + 16, headY - 17);
  ctx.lineTo(cx + 9, headY - 14);
  ctx.closePath();
  ctx.fill();

  // ========== 经典大眼睛 ==========
  const eyeY = headY + 1;

  // 眼白（大大的椭圆）
  ctx.fillStyle = '#fffef5';
  ctx.beginPath();
  ctx.ellipse(cx - 6, eyeY, 6.5, 7.5, -0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 6, eyeY, 6.5, 7.5, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // 瞳孔（看向移动方向，带点慵懒感）
  const pupilOffX = dir * 1.5; // 慵懒地稍微看
  const pupilOffY = 1;
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(cx - 6 + pupilOffX, eyeY + pupilOffY, 3.5, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + 6 + pupilOffX, eyeY + pupilOffY, 3.5, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // 瞳孔高光（灵魂之窗）
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - 6 + pupilOffX + 1.2, eyeY + pupilOffY - 1.5, 1.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx - 6 + pupilOffX - 1, eyeY + pupilOffY + 1, 0.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + 6 + pupilOffX + 1.2, eyeY + pupilOffY - 1.5, 1.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + 6 + pupilOffX - 1, eyeY + pupilOffY + 1, 0.8, 0, Math.PI * 2);
  ctx.fill();

  // ========== 鼻子和嘴 ==========
  // 小粉鼻子（倒三角）
  ctx.fillStyle = '#ff8899';
  ctx.beginPath();
  ctx.moveTo(cx, headY + 9);
  ctx.lineTo(cx - 3, headY + 12);
  ctx.lineTo(cx + 3, headY + 12);
  ctx.closePath();
  ctx.fill();

  // 嘴巴（经典的W形+嘴角下垂）
  ctx.strokeStyle = '#5c3d2e';
  ctx.lineWidth = 1.3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, headY + 12);
  ctx.lineTo(cx, headY + 15);
  ctx.moveTo(cx, headY + 15);
  ctx.quadraticCurveTo(cx - 5, headY + 13, cx - 7, headY + 16);
  ctx.moveTo(cx, headY + 15);
  ctx.quadraticCurveTo(cx + 5, headY + 13, cx + 7, headY + 16);
  ctx.stroke();

  // 胡须
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 0.9;
  // 左边胡须
  ctx.beginPath();
  ctx.moveTo(cx - 9, headY + 10); ctx.lineTo(cx - 21, headY + 7);
  ctx.moveTo(cx - 9, headY + 12); ctx.lineTo(cx - 22, headY + 12);
  ctx.moveTo(cx - 9, headY + 14); ctx.lineTo(cx - 20, headY + 17);
  // 右边胡须
  ctx.moveTo(cx + 9, headY + 10); ctx.lineTo(cx + 21, headY + 7);
  ctx.moveTo(cx + 9, headY + 12); ctx.lineTo(cx + 22, headY + 12);
  ctx.moveTo(cx + 9, headY + 14); ctx.lineTo(cx + 20, headY + 17);
  ctx.stroke();

  // ========== 小短腿 ==========
  const legAnim = Math.sin(player.animFrame * 3) * 3;
  // 左腿
  ctx.fillStyle = '#e87d0d';
  ctx.beginPath();
  ctx.ellipse(cx - 9, py + ph - 4, 5, 7 + legAnim * 0.5, 0.1, 0, Math.PI * 2);
  ctx.fill();
  // 脚掌（深色）
  ctx.fillStyle = '#c66a08';
  ctx.beginPath();
  ctx.ellipse(cx - 9, py + ph - 0.5, 5.5, 3, 0.1, 0, Math.PI * 2);
  ctx.fill();

  // 右腿
  ctx.fillStyle = '#e87d0d';
  ctx.beginPath();
  ctx.ellipse(cx + 9, py + ph - 4, 5, 7 - legAnim * 0.5, -0.1, 0, Math.PI * 2);
  ctx.fill();
  // 脚掌
  ctx.fillStyle = '#c66a08';
  ctx.beginPath();
  ctx.ellipse(cx + 9, py + ph - 0.5, 5.5, 3, -0.1, 0, Math.PI * 2);
  ctx.fill();

  // ========== 小尾巴 ==========
  ctx.strokeStyle = '#e87d0d';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + 16, py + 34);
  const tailWag = Math.sin(Date.now() / 200) * 4;
  ctx.quadraticCurveTo(cx + 26 + tailWag, py + 24, cx + 22 + tailWag * 1.5, py + 14);
  ctx.stroke();
  // 尾巴条纹
  ctx.strokeStyle = '#b35900';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx + 21 + tailWag, py + 27);
  ctx.lineTo(cx + 23 + tailWag, py + 25);
  ctx.moveTo(cx + 23 + tailWag * 1.2, py + 20);
  ctx.lineTo(cx + 25 + tailWag * 1.3, py + 18);

  ctx.restore();

  // 二段跳指示器（在翻转之外画）
  if (player.jumpCount > 0 && player.jumpCount < player.maxJumps) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px serif';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 6;
    ctx.fillText('✦', px + pw / 2 - 6, py - 5);
    ctx.shadowBlur = 0;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============ UI ============
function showOverlay(title, subtitle, hint) {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>${title}</h1>
    <p style="font-size:22px">${subtitle}</p>
    <p>${hint}</p>
    ${hint.includes('下一关') ? '<button class="start-btn" onclick="nextLevel()">下一关 ▶</button>' : '<button class="start-btn" onclick="restartGame()">再来一次 🔄</button>'}
  `;
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  score = 0;
  lives = 3;
  level = 1;
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  loadLevel(level);
  gameState = 'playing';
}

function restartGame() {
  startGame();
}

function nextLevel() {
  level++;
  lives = Math.min(lives + 1, 5); // 奖励一条命
  document.getElementById('lives').textContent = lives;
  loadLevel(level);
  document.getElementById('overlay').classList.add('hidden');
  gameState = 'playing';
}

// 空格键在结束界面操作
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    if (gameState === 'win') {
      nextLevel();
    } else if (gameState === 'gameover') {
      restartGame();
    }
  }
});

// ============ 游戏循环 ============
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// 初始化
loadLevel(1);
loop();
</script>

</html>
